<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OZBOPAN | Digital Bunker 2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: #ededed; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(23, 23, 23, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .glow { box-shadow: 0 0 20px rgba(163, 230, 53, 0.2); }
        @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin-slow { animation: spin-slow 8s linear infinite; }
    </style>
</head>
<body class="selection:bg-lime-400 selection:text-black">

    <nav class="fixed top-0 w-full z-50 p-6">
        <div class="max-w-6xl mx-auto flex justify-between items-center glass rounded-2xl px-6 py-4">
            <div class="text-2xl font-extrabold tracking-tighter mono italic">OZ<span class="text-lime-400 font-black">BOPAN</span></div>
            <div class="hidden md:flex space-x-8 mono text-[10px] font-bold tracking-widest">
                <a href="#home" class="hover:text-lime-400 transition">CORE_SYSTEM</a>
                <a href="#inventory" class="hover:text-lime-400 transition">GUDANG_DATA</a>
                <a href="#about" class="hover:text-lime-400 transition">IDENTITY</a>
            </div>
            <div class="flex items-center gap-2">
                <span class="text-[10px] mono text-gray-500 hidden sm:inline">V2.0.26_STABLE</span>
                <div class="h-2 w-2 rounded-full bg-lime-500 animate-pulse"></div>
            </div>
        </div>
    </nav>

    <section id="home" class="min-h-screen flex items-center justify-center pt-24 px-6 overflow-hidden">
        <div class="max-w-5xl w-full grid grid-cols-1 md:grid-cols-2 gap-12 items-center">
            <div class="text-left order-2 md:order-1">
                <div class="inline-block px-3 py-1 rounded-full border border-lime-500/30 text-lime-400 text-[10px] mono mb-6 bg-lime-500/5 tracking-tighter">
                    • ANALYZING_BUNKER_PROTOCOLS... DONE
                </div>
                <h1 class="text-5xl md:text-8xl font-black mb-6 tracking-tighter leading-none">
                    THE <span class="text-lime-400">NEXT</span> LEVEL.
                </h1>
                <p class="text-gray-400 text-lg leading-relaxed mb-8 border-l-2 border-lime-500/20 pl-6 max-w-md italic">
                    "Tekanan hidup berbanding lurus dengan gaya hidup." — Evolusi digital Om Opan dimulai di sini.
                </p>
                <div class="flex gap-4">
                    <button class="px-8 py-4 bg-lime-500 text-black font-black rounded-sm hover:bg-lime-400 transition-all transform hover:scale-105 mono text-xs">INITIALIZE_SITE</button>
                    <button class="px-8 py-4 glass font-bold rounded-sm hover:bg-white/5 transition-all mono text-xs">SOURCE_LOG</button>
                </div>
            </div>
            
            <div class="order-1 md:order-2 flex justify-center relative">
                <div class="absolute inset-0 bg-lime-500/10 blur-[100px] rounded-full"></div>
                <div class="glass p-1 rounded-full animate-spin-slow">
                    <div class="h-64 w-64 md:h-80 md:w-80 rounded-full border-2 border-dashed border-lime-500/30 flex items-center justify-center">
                        <div class="h-32 w-32 bg-lime-500 rounded-lg blur-xl opacity-20 animate-pulse"></div>
                        <div class="absolute text-lime-400 mono text-[10px] font-bold tracking-tighter text-center">
                            OZBOPAN_CORE<br>EST. 2026
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="py-12 text-center border-t border-white/5">
        <div class="mono text-[10px] text-gray-600 tracking-[0.4em] uppercase mb-4">
            Built with Logic & Top Kopi Gula Aren
        </div>
        <div class="text-gray-400 text-sm">
            &copy; 2026 <span class="text-white font-bold tracking-widest">OZBOPAN</span>
        </div>
    </footer>

</body>
</html>
