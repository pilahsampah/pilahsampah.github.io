<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bunker Opanowski - Interactive Lab</title>
    <style>
        body {
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .neon-frame {
            position: relative;
            width: 350px; /* Ukuran disesuaikan agar pas di layar HP */
            height: 350px;
            padding: 6px;
            border-radius: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer; /* Ubah jadi pointer biar orang tau bisa diklik */
            background: linear-gradient(45deg, #ff00ff, #00ffff, #00ff00, #ffff00, #ff0000, #ff00ff);
            background-size: 400% 400%;
            animation: rainbowMove 5s linear infinite;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
            transition: transform 0.3s ease;
        }

        .neon-frame::after {
            content: "";
            position: absolute;
            inset: -10px;
            background: inherit;
            background-size: inherit;
            filter: blur(25px);
            opacity: 0.6;
            z-index: -1;
            animation: inherit;
        }

        .img-container {
            width: 100%;
            height: 100%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
        }

        .anime-pic {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) brightness(0.7) contrast(1.1);
            transition: all 0.5s ease;
        }

        /* Support untuk Desktop (Hover) & HP (Touch/Active) */
        .neon-frame:hover .anime-pic,
        .neon-frame:active .anime-pic {
            filter: grayscale(0%) brightness(1.1) saturate(1.4) contrast(1.1);
            transform: scale(1.05);
        }

        @keyframes rainbowMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body>

    <div class="neon-frame" id="labFrame">
        <div class="img-container">
            <img src="FOTO_LO.jpg" alt="Opanowski Bio Lab" class="anime-pic">
        </div>
    </div>

    <script>
        // Script untuk redirect ke situs utama saat gambar diklik
        document.getElementById('labFrame').addEventListener('click', function() {
            window.location.href = "https://opanowski.github.io/opanowski/#";
        });
    </script>

</body>
</html>
