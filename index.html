<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Bunker Opanowski - Interactive Lab</title>

    <meta property="og:title" content="⚠️ MASUK KE BUNKER OPANOWSKI ⚠️">
    <meta property="og:description" content="Portal Eksperimen Om Opan. Sentuh gambar untuk akses situs utama!">
    <meta property="og:image" content="https://ozbopan.github.io/FOTO_LO.jpg">
    <meta property="og:url" content="https://ozbopan.github.io/">
    <meta property="og:type" content="website">

    <style>
        body {
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* Bingkai Rainbow RGB */
        .neon-frame {
            position: relative;
            width: 320px; /* Ukuran pas untuk layar HP */
            height: 320px;
            padding: 6px;
            border-radius: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            
            background: linear-gradient(45deg, #ff00ff, #00ffff, #00ff00, #ffff00, #ff0000, #ff00ff);
            background-size: 400% 400%;
            animation: rainbowMove 5s linear infinite;
            
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
            transition: transform 0.3s ease;
        }

        /* Efek Pendaran Luar */
        .neon-frame::after {
            content: "";
            position: absolute;
            inset: -10px;
            background: inherit;
            background-size: inherit;
            filter: blur(25px);
            opacity: 0.6;
            z-index: -1;
            animation: inherit;
        }

        .img-container {
            width: 100%;
            height: 100%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
        }

        .anime-pic {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) brightness(0.7) contrast(1.1);
            transition: all 0.5s ease;
        }

        /* EFEK SAAT KURSOR DEKAT (PC) ATAU DISENTUH JARI (HP) */
        .neon-frame:hover .anime-pic,
        .neon-frame:active .anime-pic {
            filter: grayscale(0%) brightness(1.1) saturate(1.4) contrast(1.1);
            transform: scale(1.05);
        }

        @keyframes rainbowMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Teks instruksi kecil di bawah */
        .hint {
            position: absolute;
            bottom: 50px;
            color: #555;
            font-size: 12px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="neon-frame" id="portal">
        <div class="img-container">
            <img src="FOTO_LO.jpg" alt="Opanowski Bio Lab" class="anime-pic">
        </div>
    </div>

    <div class="hint">TAP TO ENTER PORTAL</div>

    <script>
        // JAVASCRIPT: KLIK LANGSUNG KE SITUS UTAMA
        document.getElementById('portal').onclick = function() {
            window.location.href = "https://opanowski.github.io/opanowski/#";
        };
    </script>

</body>
</html>
